data:
  raw_path: "data/raw/cs-training.csv"
  target: "SeriousDlqin2yrs"
  test_size: 0.2
  random_state: 42

features:
  all:
    - RevolvingUtilizationOfUnsecuredLines
    - age
    - "NumberOfTime30-59DaysPastDueNotWorse"
    - DebtRatio
    - MonthlyIncome
    - NumberOfOpenCreditLinesAndLoans
    - NumberOfTimes90DaysLate
    - NumberRealEstateLoansOrLines
    - "NumberOfTime60-89DaysPastDueNotWorse"
    - NumberOfDependents
  outlier_cap:
    - col: DebtRatio
      upper_pct: 99
    - col: RevolvingUtilizationOfUnsecuredLines
      upper_pct: 99
    - col: MonthlyIncome
      upper_pct: 99
    - col: "NumberOfTime30-59DaysPastDueNotWorse"
      upper_pct: 99
    - col: NumberOfTimes90DaysLate
      upper_pct: 99
    - col: "NumberOfTime60-89DaysPastDueNotWorse"
      upper_pct: 99

mlflow:
  experiment_name: "credito_risco_pd2"
  tracking_uri: "mlruns"

models:
  random_forest:
    n_estimators: [100, 200, 300]
    max_depth: [10, 20, null]
    max_features: ["sqrt", "log2"]
    min_samples_leaf: [5, 10, 20]
    class_weight: "balanced"
  decision_tree:
    criterion: ["gini", "entropy"]
    max_depth: [5, 8, 10, 15]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [10, 20, 50]
    class_weight: "balanced"

dimensionality_reduction:
  pca:
    variance_threshold: 0.95
  lda:
    n_components: 1

cross_validation:
  n_splits: 5
  shuffle: true
